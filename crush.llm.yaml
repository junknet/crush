providers:
  waitai-openai:
    name: WaitAI OpenAI
    type: openai-compat
    base_url: ${WAITAI_CRUSH_BASE:-http://127.0.0.1:43917}/v1
    api_key: ${WAITAI_API_KEY:-${NCODER_WAITAI_KEY:?set WAITAI_API_KEY or NCODER_WAITAI_KEY}}
    models:
      - id: gpt-5.5
        name: GPT 5.5
        cost_per_1m_in: 1.25
        cost_per_1m_out: 10
        cost_per_1m_in_cached: 0.125
        cost_per_1m_out_cached: 1.25
        context_window: 1000000
        default_max_tokens: 16384
        can_reason: true
        default_reasoning_effort: low
  waitai-anthropic:
    name: WaitAI Anthropic
    type: anthropic
    base_url: ${WAITAI_CRUSH_BASE:-http://127.0.0.1:43917}
    api_key: ${WAITAI_API_KEY:-${NCODER_WAITAI_KEY:?set WAITAI_API_KEY or NCODER_WAITAI_KEY}}
    models:
      - id: claude-opus-4-7
        name: Claude Opus 4.7
        cost_per_1m_in: 15
        cost_per_1m_out: 75
        cost_per_1m_in_cached: 1.5
        cost_per_1m_out_cached: 18.75
        context_window: 200000
        default_max_tokens: 16384
        can_reason: true
        supports_attachments: true
      - id: claude-sonnet-4-6
        name: Claude Sonnet 4.6
        cost_per_1m_in: 3
        cost_per_1m_out: 15
        cost_per_1m_in_cached: 0.3
        cost_per_1m_out_cached: 3.75
        context_window: 200000
        default_max_tokens: 16384
        can_reason: true
        supports_attachments: true
      - id: claude-haiku-4-5-20251001
        name: Claude Haiku 4.5
        cost_per_1m_in: 0.8
        cost_per_1m_out: 4
        cost_per_1m_in_cached: 0.08
        cost_per_1m_out_cached: 1
        context_window: 200000
        default_max_tokens: 8192
        can_reason: false
        supports_attachments: true
models:
  build:
    model: claude-opus-4-7
    provider: waitai-anthropic
    think: true
    max_tokens: 16384
  coder:
    model: claude-sonnet-4-6
    provider: waitai-anthropic
    think: true
    max_tokens: 16384
  explore:
    model: claude-haiku-4-5-20251001
    provider: waitai-anthropic
    think: false
    max_tokens: 8192
  large:
    model: claude-opus-4-7
    provider: waitai-anthropic
    think: true
    max_tokens: 16384
  small:
    model: claude-haiku-4-5-20251001
    provider: waitai-anthropic
    think: false
    max_tokens: 8192
agents:
  build:
    id: build
    name: Build
    description: Main reasoning brain.
    model: build
  coder:
    id: coder
    name: Coder
    description: Code execution worker.
    model: coder
  explore:
    id: explore
    name: Explore
    description: Fast tool-driven explorer.
    model: explore
default_agent: build
