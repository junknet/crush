<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Mobile Snake</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #0b0f14; color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; touch-action: none; user-select: none;
  }
  #app {
    display: flex; flex-direction: column; height: 100dvh; width: 100vw;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; font-size: 14px;
  }
  header .score { font-variant-numeric: tabular-nums; font-weight: 600; }
  header button {
    background: #1f6feb; color: white; border: 0; border-radius: 8px;
    padding: 6px 12px; font-size: 14px; font-weight: 600;
  }
  #stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 6px;
  }
  canvas {
    background: #11161d;
    border: 1px solid #222a33;
    border-radius: 10px;
    touch-action: none;
    max-width: 100%; max-height: 100%;
    image-rendering: pixelated;
  }
  #pad {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 8px;
    width: min(280px, 80vw);
    margin: 10px auto 16px;
  }
  #pad button {
    aspect-ratio: 1 / 1;
    background: #1c232c; color: #e6edf3;
    border: 1px solid #2a3340;
    border-radius: 12px;
    font-size: 22px; font-weight: 700;
  }
  #pad button:active { background: #2a3340; }
  #pad .empty { visibility: hidden; }
  #overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    z-index: 10;
  }
  #overlay.hidden { display: none; }
  #overlay .card {
    background: #11161d; border: 1px solid #2a3340; border-radius: 14px;
    padding: 20px 24px; text-align: center; max-width: 320px; width: 80%;
  }
  #overlay h1 { margin: 0 0 8px; font-size: 22px; }
  #overlay p { margin: 0 0 14px; color: #9ba6b2; font-size: 14px; }
  #overlay button {
    background: #238636; color: white; border: 0; border-radius: 10px;
    padding: 10px 18px; font-size: 16px; font-weight: 700;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>Snake</div>
    <div class="score">Score: <span id="score">0</span> · Best: <span id="best">0</span></div>
    <button id="pauseBtn">Pause</button>
  </header>
  <div id="stage"><canvas id="board" width="400" height="400"></canvas></div>
  <div id="pad">
    <button class="empty"></button>
    <button data-dir="up">▲</button>
    <button class="empty"></button>
    <button data-dir="left">◀</button>
    <button class="empty"></button>
    <button data-dir="right">▶</button>
    <button class="empty"></button>
    <button data-dir="down">▼</button>
    <button class="empty"></button>
  </div>
</div>

<div id="overlay">
  <div class="card">
    <h1 id="ovTitle">Mobile Snake</h1>
    <p id="ovMsg">Swipe on the board or use the D-pad. Arrow keys / WASD on desktop.</p>
    <button id="startBtn">Start</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovMsg = document.getElementById('ovMsg');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  const COLS = 20, ROWS = 20;
  let cell = 20;

  function fitCanvas() {
    const stage = document.getElementById('stage');
    const size = Math.floor(Math.min(stage.clientWidth, stage.clientHeight));
    const dpr = window.devicePixelRatio || 1;
    cell = Math.floor(size / COLS);
    const px = cell * COLS;
    canvas.style.width = px + 'px';
    canvas.style.height = px + 'px';
    canvas.width = px * dpr;
    canvas.height = px * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }
  window.addEventListener('resize', fitCanvas);

  const BEST_KEY = 'mobile_snake_best';
  let best = +(localStorage.getItem(BEST_KEY) || 0);
  bestEl.textContent = best;

  let snake, dir, nextDir, food, score, alive, paused, tickMs, lastTick, rafId;

  function reset() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1,y:0}; nextDir = dir;
    score = 0; alive = true; paused = false;
    tickMs = 130; lastTick = 0;
    placeFood();
    scoreEl.textContent = score;
  }

  function placeFood() {
    while (true) {
      const f = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
      if (!snake.some(s => s.x===f.x && s.y===f.y)) { food = f; return; }
    }
  }

  function step() {
    if (!alive || paused) return;
    if ((nextDir.x !== -dir.x || nextDir.y !== -dir.y)) dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++; scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem(BEST_KEY, best); }
      if (tickMs > 60 && score % 4 === 0) tickMs -= 5;
      placeFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    const w = COLS * cell, h = ROWS * cell;
    ctx.fillStyle = '#11161d';
    ctx.fillRect(0,0,w,h);

    ctx.strokeStyle = '#1a212b';
    ctx.lineWidth = 1;
    for (let i=1;i<COLS;i++){ ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,h); ctx.stroke(); }
    for (let j=1;j<ROWS;j++){ ctx.beginPath(); ctx.moveTo(0,j*cell); ctx.lineTo(w,j*cell); ctx.stroke(); }

    ctx.fillStyle = '#e5534b';
    roundRect(food.x*cell+2, food.y*cell+2, cell-4, cell-4, 4); ctx.fill();

    snake.forEach((s,i) => {
      ctx.fillStyle = i===0 ? '#2ea043' : '#3fb950';
      roundRect(s.x*cell+1, s.y*cell+1, cell-2, cell-2, 4); ctx.fill();
    });
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function loop(ts){
    if (!lastTick) lastTick = ts;
    if (ts - lastTick >= tickMs) { step(); lastTick = ts; }
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function gameOver(){
    alive = false;
    cancelAnimationFrame(rafId);
    ovTitle.textContent = 'Game Over';
    ovMsg.textContent = `Score ${score} · Best ${best}. Tap to play again.`;
    startBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function start(){
    overlay.classList.add('hidden');
    reset(); fitCanvas();
    cancelAnimationFrame(rafId);
    lastTick = 0;
    rafId = requestAnimationFrame(loop);
    pauseBtn.textContent = 'Pause';
  }

  function setDir(d){
    if (!alive) return;
    const map = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
    const n = map[d]; if (!n) return;
    if (n.x === -dir.x && n.y === -dir.y) return;
    nextDir = n;
  }

  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k==='arrowup'||k==='w') setDir('up');
    else if (k==='arrowdown'||k==='s') setDir('down');
    else if (k==='arrowleft'||k==='a') setDir('left');
    else if (k==='arrowright'||k==='d') setDir('right');
    else if (k===' ') togglePause();
  });

  document.querySelectorAll('#pad button[data-dir]').forEach(b => {
    const handler = e => { e.preventDefault(); setDir(b.dataset.dir); };
    b.addEventListener('touchstart', handler, {passive:false});
    b.addEventListener('mousedown', handler);
  });

  let tStart=null;
  canvas.addEventListener('touchstart', e => {
    const t = e.changedTouches[0]; tStart = {x:t.clientX,y:t.clientY,t:Date.now()};
  }, {passive:true});
  canvas.addEventListener('touchend', e => {
    if (!tStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - tStart.x, dy = t.clientY - tStart.y;
    if (Math.abs(dx) < 14 && Math.abs(dy) < 14) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx>0?'right':'left');
    else setDir(dy>0?'down':'up');
    tStart=null;
  }, {passive:true});

  function togglePause(){
    if (!alive) return;
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  }
  pauseBtn.addEventListener('click', togglePause);
  startBtn.addEventListener('click', start);

  reset(); fitCanvas(); draw();
})();
</script>
</body>
</html>
